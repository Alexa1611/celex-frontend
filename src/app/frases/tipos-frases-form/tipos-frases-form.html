<div class="contenido-listado">
  <h2 class="titulo-listado">Tipos de Frases Form</h2>

  <form class="formulario-clase" (ngSubmit)="guardar()">
    <div class="mb-3">
      <label class="form-label" for="id">id</label>
      <input
        id="id"
        type="text"
        class="form-control"
        [value]="id ?? ''"
        readonly
      />
    </div>

    <div class="mb-4">
      <label class="form-label" for="nombre">nombre</label>
      <input
        id="nombre"
        type="text"
        class="form-control"
        [(ngModel)]="nombre"
        name="nombre"
        required
      />
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-outline-dark px-4">Guardar</button>
    </div>
  </form>
</div>
